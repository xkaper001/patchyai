id: scan
namespace: patchy

inputs:
  - id: installation_id
    type: STRING
    required: true
    description: Installation ID
  - id: repo_full_name
    type: STRING
    required: true
    description: Full name of the repository in format user_name/repository_name

tasks:
  - id: get_token
    type: io.kestra.plugin.core.flow.Subflow
    namespace: patchy
    inputs:
      installation_id: "{{inputs.installation_id}}"
    flowId: get_auth_token
  - id: clone_repo
    type: io.kestra.plugin.git.Clone
    url: https://github.com/{{inputs.repo_full_name}}
